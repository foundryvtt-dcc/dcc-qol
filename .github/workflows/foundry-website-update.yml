name: Foundry Website Update

on:
  release:
    types:
      - published

jobs:
  update_foundry_website_post_release:
    runs-on: ubuntu-latest
    name: Foundry Website Update
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Foundry Website Update
        id: foundry-website-update
        uses: foundryvtt-dcc/foundry-package-release-action@main
        with:
          actionToken: ${{ secrets.GITHUB_TOKEN }}
          manifestFileName: 'module.json'
          # This repo's Foundry release token secret is named PACKAGE_TOKEN
          # (other foundryvtt-dcc repos call it FOUNDRY_PACKAGE_RELEASE_TOKEN).
          foundryToken: ${{ secrets.PACKAGE_TOKEN }}
          dryRun: false
